ay:
  aux_sync_policy: closed_form
  feature_transform_ops:
  - pitch_shift
  - pitch_vibrato
  - rhythm_stretch
  - rhythm_shift
  - timbre_high_cut
  - timbre_eq_tilt
  - timbre_formant
  include_commutativity: true
  include_rhythm_equivariance: true
  mel_fmax_hz: 22050.0
  mel_fmin_hz: 0.0
  pitch_bins_per_semitone: 7
  pitch_max_st: 4.0
  pitch_min_st: -4.0
  rhythm_max_scale: 1.1111
  rhythm_min_scale: 0.9
  rhythm_shift_max_steps: 16
  rhythm_shift_min_steps: -16
  target_change_margin: 0.03
  timbre_formant_max_scale: 1.15
  timbre_formant_min_scale: 0.85
  timbre_high_cut_max_hz: 12000.0
  timbre_high_cut_min_hz: 3000.0
  timbre_max_tilt_db: 6.0
  timbre_min_tilt_db: -6.0
  transform_backend: feature
  vibrato_lfo_hz: 5.0
  vibrato_max_amount: 2.0
  vibrato_min_amount: 0.5
  w_comm: 0.5
  w_equiv: 1.0
  w_inv: 1.0
data:
  augment: true
  crop_seconds: 3.0
  envelope_feat_name: envelope_instru.npy
  feat_hop: 512
  latent_hop: 512
  mel_linear_feat_name: mel_linear_instru.npy
  n_envelope_dim: 80
  n_mels: 128
  n_mfcc: 20
  n_pitch_bins: 588
  n_rhythm_channels: 8
  normalize_audio: true
  pitch_feat_name: pitch_salience_instru_nondrum.npy
  prefer_envelope_timbre: false
  rhythm_feat_name: rhythm_instru.npy
  rhythm_multi_feat_name: rhythm_multi_instru.npy
  roots:
  - data/processed/musdb18hq
  sample_rate: 44100
  spec_feat_name: mel_linear_instru.npy
  timbre_feat_name: mfcc_instru.npy
  train_list: data/mini_dataset/train.txt
  val_list: data/mini_dataset/val.txt
model:
  K: 4
  content_residual: true
  d_r: 64
  d_t: 128
  dec_activation: ELU
  dec_activation_params: null
  dec_in_dim: 256
  dec_lstm: 0
  dec_n_filters: 32
  dec_n_residual_layers: 3
  dec_norm: weight_norm
  dec_ratios:
  - 8
  - 8
  - 4
  - 2
  enc_hidden: 256
  enc_kernel: 3
  enc_n_layers_main: 5
  enc_n_layers_side: 3
  film_gamma_clamp: 0.5
  film_gamma_init: 0.1
  fusion_hidden_dims:
  - 512
  - 512
  head_hidden: 256
  mel_in_dim: 128
  n_pitch_bins: 128
  pitch_conv_out_gain: 5.0
  pitch_embed_dim: 128
  pitch_embed_hidden: 256
  pitch_head_use_toeplitz: true
  pitch_in_dim: 588
  rhythm_in_dim: 8
  variant: A
seed: 0
train:
  amp: true
  aux_dropout_p: 0.0
  batch_size: 4
  betas:
  - 0.9
  - 0.99
  ckpt_every: 2000
  curriculum_comm_end: 15000
  curriculum_equiv_end: 8000
  curriculum_inv_end: 3000
  device: cuda
  fft_sizes:
  - 2048
  - 4096
  - 8192
  grad_clip: 1.0
  hop_sizes:
  - 256
  - 512
  - 1024
  init_ckpt: runs/stage1_variant_a/ckpt_step00008000.pt
  keep_last: 3
  load_init_strict: false
  log_every: 50
  lr: 0.00015
  max_steps: 30000
  media_every: 1000
  moe_k: 8
  n_mels: 128
  num_workers: 4
  ortho_form: cross_cov
  out_dir: ./runs/stage2_variant_b_codec
  require_codec_distill: false
  use_adv: false
  use_ema: false
  use_mssd: false
  val_every: 1000
  w_ay: 1.0
  w_codec_distill: 0.0
  w_kl: 0.0
  w_logmel: 0.5
  w_moe_r: 0.0
  w_moe_t: 0.001
  w_ortho: 0.1
  w_recon: 1.0
  w_trunk_l1: 0.0
  wandb_entity: null
  wandb_mode: online
  wandb_project: shayi-stage2
  wandb_run_name: stage2-B_codec-dac44k-seed0
  warmup_steps: 500
  weight_decay: 0.0001
  win_lengths:
  - 2048
  - 4096
  - 8192
