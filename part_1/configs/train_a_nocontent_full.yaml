seed: 42

data:
  train_list: data/full_dataset_train.txt
  val_list: data/full_dataset_val.txt
  roots:
    - data/processed/slakh2100
  sample_rate: 44100
  crop_seconds: 10.0
  feat_hop: 512
  latent_hop: 512
  n_pitch_bins: 588
  n_mels: 128
  n_mfcc: 20
  n_rhythm_channels: 8
  rhythm_multi_feat_name: rhythm_multi_instru.npy
  prefer_envelope_timbre: false
  n_envelope_dim: 80
  envelope_feat_name: envelope_instru.npy
  pitch_feat_name: pitch_salience_instru_nondrum.npy
  rhythm_feat_name: rhythm_instru.npy
  timbre_feat_name: mfcc_instru.npy
  spec_feat_name: mel_linear_instru.npy
  mel_linear_feat_name: mel_linear_instru.npy
  normalize_audio: true
  augment: true

model:
  variant: A

  pitch_in_dim: 588
  rhythm_in_dim: 8
  mel_in_dim: 128

  enc_hidden: 256
  enc_n_layers_side: 3
  enc_n_layers_main: 5
  enc_kernel: 3

  K: 4
  n_pitch_bins: 128
  d_r: 64
  d_t: 128
  head_hidden: 256
  pitch_head_use_toeplitz: true
  pitch_conv_out_gain: 5.0

  pitch_embed_dim: 128
  pitch_embed_hidden: 256
  dec_in_dim: 256
  fusion_hidden_dims: [512, 512]
  film_gamma_init: 0.1
  film_gamma_clamp: 0.5

  content_residual: false

  dec_n_filters: 32
  dec_n_residual_layers: 3
  dec_ratios: [8, 8, 4, 2]
  dec_norm: weight_norm
  dec_activation: AliasFreeSnakeBeta
  dec_activation_params: {alpha_init: 1.0, beta_init: 1.0}
  dec_lstm: 2

  use_adv_on_zt: true
  adv_pitch_on_zt_lambd: 0.3
  adv_rhythm_on_zt_lambd: 0.3
  use_adv_on_zr: false
  use_content_adv: false

train:
  batch_size: 1
  accum_steps: 4
  num_workers: 4

  lr: 3.0e-4
  betas: [0.9, 0.99]
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_steps: 500
  max_steps: 40000

  w_recon: 1.0
  w_codec_distill: 0.0
  require_codec_distill: false
  w_ortho: 0.1
  ortho_form: cross_cov

  w_kl: 0.0
  kl_beta_p: 1.0
  kl_beta_r: 1.0
  kl_beta_t: 1.0

  w_moe_t: 0.0
  w_moe_r: 0.0
  moe_k: 8

  w_trunk_l1: 0.0
  trunk_l1_form: group_lasso
  aux_dropout_p: 0.0

  w_pitch_anchor: 0.2
  pitch_anchor_warmup: 5000
  pitch_anchor_decay_end: 15000
  pitch_anchor_tau: 0.3

  w_timbre_anchor: 0.0
  w_rhythm_anchor: 0.0

  w_content_adv: 0.0
  w_adv_pitch_on_zt: 0.0
  w_adv_rhythm_on_zt: 0.0
  w_adv_pitch_on_zr: 0.0
  w_adv_envelope_on_zr: 0.0

  fft_sizes:  [2048, 4096, 8192]
  hop_sizes:  [256, 512, 1024]
  win_lengths: [2048, 4096, 8192]
  n_mels: 256
  w_logmel: 1.0
  w_wav_l1: 1.0

  leakage_probe_every: 500
  mi_probe_every: 5000
  mi_inner_steps: 200
  mi_hidden: 256

  use_adv: true
  w_adv: 1.0
  w_feat_match: 10.0
  use_mssd: true

  use_ema: true
  ema_decay: 0.999
  ema_warmup: 1000

  log_every: 20
  val_every: 1000
  ckpt_every: 1000
  media_every: 2000
  out_dir: ./runs/stage1_nocontent
  keep_last: 10

  wandb_project: shayi-stage1
  wandb_run_name: stage1-nocontent-full-6gpu
  wandb_entity: null
  wandb_mode: offline

  tb_enabled: true
  tb_flush_every: 20

  device: cuda
  amp: true
