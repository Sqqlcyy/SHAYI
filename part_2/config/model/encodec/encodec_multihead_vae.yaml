# @package __global__
# Multi-head VAE Encodec: backbone 128-d -> 3 heads (Pitch 256, Timbre 128, Rhythm 128) -> VAE -> concat 512-d -> decoder.
# Use with compression_model: encodec and model: encodec/encodec_multihead_vae (or set encodec.autoencoder/quantizer in override).

defaults:
  - encodec/default

encodec:
  autoencoder: multihead_vae
  quantizer: continuous_latent
  sample_rate: ${sample_rate}
  channels: ${channels}
  causal: false
  renormalize: false

seanet:
  dimension: 128
  channels: ${channels}
  causal: ${encodec.causal}
  n_filters: 32
  n_residual_layers: 1
  ratios: [8, 5, 4, 2]
  activation: ELU
  activation_params: {"alpha": 1.}
  norm: weight_norm
  norm_params: {}
  kernel_size: 7
  residual_kernel_size: 3
  last_kernel_size: 7
  dilation_base: 2
  pad_mode: constant
  true_skip: true
  compress: 2
  lstm: 0
  disable_norm_outer_blocks: 0
  decoder:
    trim_right_ratio: 1.0
    final_activation: null
    final_activation_params: null
  encoder: {}

continuous_latent:
  cardinality: 65536
